<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métha Campus | Maquette 3D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        /* Importation de tes variables CSS existantes */
        :root {
            --bg: #f2fcf5;
            --surface: #ffffff;
            --primary: #064e3b;
            --primary-light: #047857;
            --accent: #10b981;
            --accent-dark: #059669;
            --accent-light: #d1fae5;
            --border: #a7f3d0;
            --text-main: #064e3b;
            --text-muted: #4b8a73;
            --shadow: 0 4px 6px -1px rgba(6, 78, 59, 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2 { font-family: 'Syne', sans-serif; }

        /* Styles simplifiés de ta navbar pour garder la cohérence */
        nav {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .btn-retour {
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }

        .btn-retour:hover { color: var(--accent); }

        /* Conteneur principal de la maquette */
        .viewer-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .viewer-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .viewer-header h1 {
            color: var(--primary);
            margin: 0 0 0.5rem 0;
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: -0.03em;
        }

        .viewer-header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.1rem;
        }

        /* Style de la balise model-viewer */
        model-viewer {
            width: 100%;
            height: 65vh;
            background-color: var(--surface);
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: 
                6px 6px 16px rgba(0,0,0,0.06),
                -4px -4px 12px rgba(255,255,255,0.9);
            --poster-color: transparent;
        }

        /* Barre de progression de chargement */
        .progress-bar {
            display: block;
            width: 33%;
            height: 4px;
            max-height: 2%;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate3d(-50%, -50%, 0);
            border-radius: 4px;
            box-shadow: 0px 3px 10px 3px rgba(0, 0, 0, 0.1), 0px 0px 5px 1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.9);
            background-color: var(--bg);
        }

        .progress-bar.hide {
            visibility: hidden;
            transition: visibility 0.3s;
        }

        .update-bar {
            background-color: var(--accent);
            width: 0%;
            height: 100%;
            border-radius: 4px;
            float: left;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="btn-retour">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Retour au dossier
        </a>
    </nav>

    <div class="viewer-container">
        <div class="viewer-header">
            <h1>Infrastructure Métha Campus</h1>
            <p>Visualisation interactive de l'unité de méthanisation sur le campus des Cezeaux. Utilisez la souris ou le tactile pour pivoter et zoomer.</p>
        </div>

        <model-viewer 
            src="cezeaux.glb    " 
            alt="Maquette 3D de l'unité de méthanisation" 
            auto-rotate
            camera-orbit="115deg 75deg 70%"
            rotation-per-second="25deg"
            camera-controls
            shadow-intensity="1"
            environment-image="neutral"
            exposure="1.2">
            
            <div class="progress-bar hide" slot="progress-bar">
                <div class="update-bar"></div>
            </div>
        </model-viewer>
    </div>

    <script>
        // Gestion de la barre de chargement du modèle 3D
        const modelViewer = document.querySelector('model-viewer');
        const progressWrap = document.querySelector('.progress-bar');
        const updateBar = document.querySelector('.update-bar');

        modelViewer.addEventListener('progress', (event) => {
            const progress = event.detail.totalProgress;
            updateBar.style.width = `${progress * 100}%`;
            if (progress === 1) {
                progressWrap.classList.add('hide');
            } else {
                progressWrap.classList.remove('hide');
            }
        });
    </script>
</body>
</html>
